<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavali - Wishlist Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95' },
                        slate: { 50: '#f8fafc', 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInScale 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Smooth transitions for cards */
        .card-hover {
            transition: all 0.2s ease-in-out;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen antialiased selection:bg-brand-100 selection:text-brand-900 pb-12">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <header class="mb-10 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-indigo-500 tracking-tight flex items-center gap-3">
                    <i class="fa-solid fa-sparkles text-brand-500"></i> Kavali
                </h1>
                <p class="text-slate-500 mt-2 font-medium">Curate, track, and acquire the things you love.</p>
            </div>
            <button onclick="clearPurchased()" id="clear-btn" class="hidden bg-white border border-slate-200 hover:border-red-200 hover:bg-red-50 hover:text-red-600 text-slate-600 px-4 py-2 rounded-xl text-sm font-semibold transition-all shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-broom"></i> Clear Acquired
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm flex items-center gap-5 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-brand-50 rounded-full opacity-50"></div>
                <div class="bg-gradient-to-br from-brand-100 to-brand-200 text-brand-600 w-14 h-14 rounded-2xl flex items-center justify-center text-2xl shadow-sm z-10">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div class="z-10">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total Items</p>
                    <p class="text-3xl font-bold text-slate-900 mt-1" id="stat-total">0</p>
                </div>
            </div>
            
            <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm flex items-center gap-5 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-50 rounded-full opacity-50"></div>
                <div class="bg-gradient-to-br from-emerald-100 to-emerald-200 text-emerald-600 w-14 h-14 rounded-2xl flex items-center justify-center text-2xl shadow-sm z-10">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <div class="z-10">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Remaining Cost</p>
                    <p class="text-3xl font-bold text-slate-900 mt-1" id="stat-cost">$0.00</p>
                </div>
            </div>
            
            <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm flex items-center gap-5 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-amber-50 rounded-full opacity-50"></div>
                <div class="bg-gradient-to-br from-amber-100 to-amber-200 text-amber-600 w-14 h-14 rounded-2xl flex items-center justify-center text-2xl shadow-sm z-10">
                    <i class="fa-solid fa-box-open"></i>
                </div>
                <div class="z-10">
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">To Acquire</p>
                    <p class="text-3xl font-bold text-slate-900 mt-1" id="stat-remaining">0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 sticky top-6">
                    <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                        <h2 class="text-xl font-bold text-slate-800" id="form-title">Add to Kavali</h2>
                        <button type="button" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden text-sm text-slate-400 hover:text-red-500 font-medium transition-colors">
                            Cancel Edit
                        </button>
                    </div>
                    
                    <form id="add-item-form" class="space-y-5">
                        <input type="hidden" id="edit-id" value="">
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Item Name <span class="text-red-400">*</span></label>
                            <input type="text" id="input-name" required placeholder="e.g. Sony WH-1000XM5" 
                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder:text-slate-400">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Category <span class="text-red-400">*</span></label>
                            <select id="input-category" required 
                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all appearance-none cursor-pointer">
                                <option value="" disabled selected>Select a category</option>
                                <option value="Materials">Materials</option>
                                <option value="Products">Products</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Miscellaneous">Miscellaneous</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Price ($)</label>
                                <input type="number" id="input-price" step="0.01" min="0" placeholder="0.00" 
                                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder:text-slate-400">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Priority <span class="text-red-400">*</span></label>
                                <select id="input-priority" required 
                                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all appearance-none cursor-pointer">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">URL / Link</label>
                            <input type="url" id="input-url" placeholder="https://..." 
                                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder:text-slate-400">
                        </div>

                        <button type="submit" id="submit-btn"
                            class="w-full mt-4 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-700 hover:to-brand-600 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 focus:ring-4 focus:ring-brand-200 flex justify-center items-center gap-2">
                            <i class="fa-solid fa-plus"></i> <span>Add Item</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col h-full">
                
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mb-6 flex flex-col md:flex-row gap-4 justify-between items-center z-10">
                    
                    <div class="relative w-full md:w-1/3">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="search-input" placeholder="Search Kavali..." 
                            class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition-all">
                    </div>

                    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                        <div class="flex items-center gap-2 w-full sm:w-auto bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
                            <i class="fa-solid fa-filter text-slate-400 text-sm"></i>
                            <select id="filter-category" class="bg-transparent text-sm font-medium text-slate-700 outline-none cursor-pointer w-full">
                                <option value="All">All Categories</option>
                                <option value="Materials">Materials</option>
                                <option value="Products">Products</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Miscellaneous">Miscellaneous</option>
                            </select>
                        </div>
                        
                        <div class="flex items-center gap-2 w-full sm:w-auto bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
                            <i class="fa-solid fa-arrow-down-wide-short text-slate-400 text-sm"></i>
                            <select id="sort-items" class="bg-transparent text-sm font-medium text-slate-700 outline-none cursor-pointer w-full">
                                <option value="date-desc">Newest First</option>
                                <option value="date-asc">Oldest First</option>
                                <option value="price-desc">Price: High to Low</option>
                                <option value="price-asc">Price: Low to High</option>
                                <option value="priority">Highest Priority</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="empty-state" class="hidden flex-col items-center justify-center py-20 px-4 bg-white rounded-3xl border border-slate-200 border-dashed">
                    <div class="w-24 h-24 bg-brand-50 rounded-full flex items-center justify-center text-brand-300 text-4xl mb-5">
                        <i class="fa-solid fa-box-open"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800">Nothing here yet!</h3>
                    <p class="text-slate-500 mt-2 text-center max-w-sm">Your Kavali is empty. Start adding items you wish to acquire using the form.</p>
                </div>

                <div id="item-list" class="space-y-4">
                    </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let wishlist = JSON.parse(localStorage.getItem('kavali_wishlist')) || [];

            // DOM Elements
            const form = document.getElementById('add-item-form');
            const listContainer = document.getElementById('item-list');
            const emptyState = document.getElementById('empty-state');
            
            const searchInput = document.getElementById('search-input');
            const filterSelect = document.getElementById('filter-category');
            const sortSelect = document.getElementById('sort-items');
            
            const clearBtn = document.getElementById('clear-btn');
            const submitBtn = document.getElementById('submit-btn');
            const cancelEditBtn = document.getElementById('cancel-edit-btn');
            const formTitle = document.getElementById('form-title');
            const editIdInput = document.getElementById('edit-id');

            // Utilities
            const generateId = () => '_' + Math.random().toString(36).substr(2, 9);
            const formatCurrency = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount || 0);
            const escapeHTML = (str) => { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; };

            // Initialize
            renderApp();

            // Listeners
            form.addEventListener('submit', handleAddOrUpdate);
            searchInput.addEventListener('input', renderApp);
            filterSelect.addEventListener('change', renderApp);
            sortSelect.addEventListener('change', renderApp);

            // Handle Add / Update
            function handleAddOrUpdate(e) {
                e.preventDefault();
                
                const id = editIdInput.value;
                const name = document.getElementById('input-name').value.trim();
                const category = document.getElementById('input-category').value;
                const price = parseFloat(document.getElementById('input-price').value) || 0;
                const priority = document.getElementById('input-priority').value;
                const url = document.getElementById('input-url').value.trim();

                if (!name || !category) return;

                if (id) {
                    // Update existing
                    const index = wishlist.findIndex(i => i.id === id);
                    if (index !== -1) {
                        wishlist[index] = { ...wishlist[index], name, category, price, priority, url };
                    }
                    cancelEdit(); // Reset form state
                } else {
                    // Add new
                    wishlist.push({
                        id: generateId(),
                        name, category, price, priority, url,
                        purchased: false,
                        createdAt: Date.now()
                    });
                    form.reset();
                    document.getElementById('input-priority').value = 'Medium';
                }

                saveData();
                renderApp();
            }

            // Edit Item triggers form population
            window.editItem = function(id) {
                const item = wishlist.find(i => i.id === id);
                if (!item) return;

                editIdInput.value = item.id;
                document.getElementById('input-name').value = item.name;
                document.getElementById('input-category').value = item.category;
                document.getElementById('input-price').value = item.price || '';
                document.getElementById('input-priority').value = item.priority;
                document.getElementById('input-url').value = item.url || '';

                // Update UI for Edit Mode
                formTitle.textContent = "Edit Item";
                submitBtn.innerHTML = '<i class="fa-solid fa-save"></i> <span>Save Changes</span>';
                submitBtn.className = "w-full mt-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 focus:ring-4 focus:ring-amber-200 flex justify-center items-center gap-2";
                cancelEditBtn.classList.remove('hidden');

                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Cancel Edit
            window.cancelEdit = function() {
                editIdInput.value = '';
                form.reset();
                document.getElementById('input-priority').value = 'Medium';
                
                formTitle.textContent = "Add to Kavali";
                submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> <span>Add Item</span>';
                submitBtn.className = "w-full mt-4 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-700 hover:to-brand-600 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 focus:ring-4 focus:ring-brand-200 flex justify-center items-center gap-2";
                cancelEditBtn.classList.add('hidden');
            };

            // Delete Item
            window.deleteItem = function(id) {
                if(confirm("Are you sure you want to remove this item?")) {
                    wishlist = wishlist.filter(item => item.id !== id);
                    if(editIdInput.value === id) cancelEdit();
                    saveData();
                    renderApp();
                }
            };

            // Toggle Purchased
            window.togglePurchased = function(id) {
                const item = wishlist.find(item => item.id === id);
                if (item) {
                    item.purchased = !item.purchased;
                    saveData();
                    renderApp();
                }
            };

            // Clear Purchased
            window.clearPurchased = function() {
                if(confirm("Clear all items marked as acquired? This cannot be undone.")) {
                    wishlist = wishlist.filter(item => !item.purchased);
                    saveData();
                    renderApp();
                }
            };

            // Save
            function saveData() { localStorage.setItem('kavali_wishlist', JSON.stringify(wishlist)); }

            // Stats
            function updateDashboard() {
                const totalItems = wishlist.length;
                const remainingItems = wishlist.filter(item => !item.purchased).length;
                const remainingCost = wishlist.reduce((sum, item) => !item.purchased ? sum + (item.price || 0) : sum, 0);

                document.getElementById('stat-total').textContent = totalItems;
                document.getElementById('stat-remaining').textContent = remainingItems;
                document.getElementById('stat-cost').textContent = formatCurrency(remainingCost);

                // Show/hide clear button
                const hasPurchased = wishlist.some(i => i.purchased);
                hasPurchased ? clearBtn.classList.remove('hidden') : clearBtn.classList.add('hidden');
            }

            // Badges
            function getPriorityBadge(priority, isPurchased) {
                const op = isPurchased ? "opacity-50" : "";
                let colors = "";
                if(priority === 'High') colors = "bg-red-50 text-red-600 border-red-100";
                else if(priority === 'Medium') colors = "bg-amber-50 text-amber-600 border-amber-100";
                else colors = "bg-blue-50 text-blue-600 border-blue-100";
                
                return `<span class="text-xs font-bold px-2.5 py-1 rounded-md border ${colors} ${op}">${priority}</span>`;
            }

            function getCategoryIcon(cat) {
                const map = {
                    'Materials': '<i class="fa-solid fa-cube text-indigo-400"></i>',
                    'Products': '<i class="fa-solid fa-bag-shopping text-pink-400"></i>',
                    'Electronics': '<i class="fa-solid fa-laptop text-cyan-400"></i>',
                    'Miscellaneous': '<i class="fa-solid fa-puzzle-piece text-amber-400"></i>'
                };
                return map[cat] || '<i class="fa-solid fa-tag text-slate-400"></i>';
            }

            // Render Process
            function renderApp() {
                updateDashboard();
                
                const searchTerm = searchInput.value.toLowerCase();
                const filter = filterSelect.value;
                const sortMethod = sortSelect.value;

                // 1. Filter
                let processedList = wishlist.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(searchTerm);
                    const matchesCategory = filter === 'All' || item.category === filter;
                    return matchesSearch && matchesCategory;
                });

                // 2. Sort 
                processedList.sort((a, b) => {
                    // Always put acquired items at the bottom regardless of sort
                    if (a.purchased !== b.purchased) return a.purchased ? 1 : -1;

                    if (sortMethod === 'date-desc') return b.createdAt - a.createdAt;
                    if (sortMethod === 'date-asc') return a.createdAt - b.createdAt;
                    if (sortMethod === 'price-desc') return (b.price || 0) - (a.price || 0);
                    if (sortMethod === 'price-asc') return (a.price || 0) - (b.price || 0);
                    if (sortMethod === 'priority') {
                        const pMap = { 'High': 3, 'Medium': 2, 'Low': 1 };
                        return pMap[b.priority] - pMap[a.priority];
                    }
                    return 0;
                });

                listContainer.innerHTML = '';

                if (processedList.length === 0) {
                    emptyState.classList.remove('hidden');
                    emptyState.classList.add('flex');
                    if(wishlist.length > 0) {
                        emptyState.querySelector('h3').textContent = "No matches found";
                        emptyState.querySelector('p').textContent = "Try adjusting your search or filters.";
                    }
                } else {
                    emptyState.classList.add('hidden');
                    emptyState.classList.remove('flex');

                    processedList.forEach(item => {
                        const nameEscaped = escapeHTML(item.name);
                        const isPurchased = item.purchased;
                        const cardState = isPurchased ? 'bg-slate-50 border-slate-200 opacity-75' : 'bg-white border-slate-100 card-hover';
                        const textState = isPurchased ? 'line-through text-slate-400' : 'text-slate-800';
                        
                        const itemHTML = `
                            <div class="${cardState} p-5 rounded-2xl border shadow-sm animate-fade-in flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between transition-all duration-300">
                                
                                <div class="flex items-start gap-4 flex-1 overflow-hidden w-full">
                                    <button onclick="togglePurchased('${item.id}')" 
                                        class="mt-1 w-7 h-7 rounded-lg border-2 flex shrink-0 items-center justify-center transition-all ${isPurchased ? 'bg-brand-500 border-brand-500 text-white shadow-inner' : 'border-slate-300 bg-slate-50 text-transparent hover:border-brand-400 hover:bg-white'}">
                                        <i class="fa-solid fa-check text-sm"></i>
                                    </button>
                                    
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-3 mb-1.5 flex-wrap">
                                            <h3 class="font-extrabold text-lg ${textState} truncate">${nameEscaped}</h3>
                                            ${item.url ? `<a href="${item.url}" target="_blank" class="w-7 h-7 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-brand-100 hover:text-brand-600 transition-colors" title="Visit Link"><i class="fa-solid fa-link text-xs"></i></a>` : ''}
                                        </div>
                                        <div class="flex items-center gap-3 flex-wrap">
                                            <span class="text-sm font-medium text-slate-600 flex items-center gap-1.5 bg-slate-100 px-2.5 py-1 rounded-md">
                                                ${getCategoryIcon(item.category)} ${item.category}
                                            </span>
                                            ${getPriorityBadge(item.priority, isPurchased)}
                                        </div>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between w-full sm:w-auto gap-4 pl-11 sm:pl-0">
                                    <div class="text-xl font-bold tracking-tight ${isPurchased ? 'text-slate-400' : 'text-slate-800'}">
                                        ${item.price > 0 ? formatCurrency(item.price) : '<span class="text-sm font-medium text-slate-400 bg-slate-100 px-2 py-1 rounded">No price</span>'}
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <button onclick="editItem('${item.id}')" title="Edit item"
                                            class="w-9 h-9 flex items-center justify-center rounded-xl text-slate-400 bg-white border border-slate-200 hover:text-amber-600 hover:border-amber-200 hover:bg-amber-50 transition-all shadow-sm">
                                            <i class="fa-solid fa-pen text-sm"></i>
                                        </button>
                                        <button onclick="deleteItem('${item.id}')" title="Delete item"
                                            class="w-9 h-9 flex items-center justify-center rounded-xl text-slate-400 bg-white border border-slate-200 hover:text-red-600 hover:border-red-200 hover:bg-red-50 transition-all shadow-sm">
                                            <i class="fa-regular fa-trash-can text-sm"></i>
                                        </button>
                                    </div>
                                </div>
                                
                            </div>
                        `;
                        listContainer.insertAdjacentHTML('beforeend', itemHTML);
                    });
                }
            }
        });
    </script>
</body>
</html>
