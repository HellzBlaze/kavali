<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: { 500: '#6366f1', 600: '#4f46e5' },
                        slate: { 50: '#f8fafc', 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-20px); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .animate-fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }
        
        /* Custom Scrollbar for better UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Strikethrough transition */
        .strike-transition {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen antialiased selection:bg-indigo-100 selection:text-indigo-900">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <header class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
                    <i class="fa-solid fa-wand-magic-sparkles text-indigo-500"></i> Wishlist
                </h1>
                <p class="text-slate-500 mt-1">Manage, track, and acquire your desired items.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="bg-indigo-50 text-indigo-600 w-12 h-12 rounded-full flex items-center justify-center text-xl">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500">Total Items</p>
                    <p class="text-2xl font-bold text-slate-900" id="stat-total">0</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="bg-emerald-50 text-emerald-600 w-12 h-12 rounded-full flex items-center justify-center text-xl">
                    <i class="fa-solid fa-sack-dollar"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500">Estimated Cost (Remaining)</p>
                    <p class="text-2xl font-bold text-slate-900" id="stat-cost">$0.00</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="bg-amber-50 text-amber-600 w-12 h-12 rounded-full flex items-center justify-center text-xl">
                    <i class="fa-solid fa-box-open"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500">Items Remaining</p>
                    <p class="text-2xl font-bold text-slate-900" id="stat-remaining">0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 sticky top-6">
                    <h2 class="text-lg font-bold text-slate-800 mb-5 border-b border-slate-100 pb-3">Add New Item</h2>
                    
                    <form id="add-item-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Item Name *</label>
                            <input type="text" id="input-name" required placeholder="e.g. Mechanical Keyboard" 
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Category *</label>
                            <select id="input-category" required 
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                                <option value="" disabled selected>Select a category</option>
                                <option value="Materials">Materials</option>
                                <option value="Products">Products</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Miscellaneous">Miscellaneous</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Price ($)</label>
                                <input type="number" id="input-price" step="0.01" min="0" placeholder="0.00" 
                                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Priority *</label>
                                <select id="input-priority" required 
                                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">URL / Link</label>
                            <input type="url" id="input-url" placeholder="https://example.com" 
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
                        </div>

                        <button type="submit" 
                            class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors shadow-sm focus:ring-4 focus:ring-indigo-100 flex justify-center items-center gap-2">
                            <i class="fa-solid fa-plus"></i> Add to Wishlist
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 flex flex-col h-full">
                
                <div class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-xl border border-slate-100 shadow-sm mb-6 gap-4">
                    <h2 class="text-lg font-bold text-slate-800">Your Items</h2>
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <i class="fa-solid fa-filter text-slate-400"></i>
                        <select id="filter-category" 
                            class="w-full sm:w-48 px-3 py-1.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white cursor-pointer">
                            <option value="All">All Categories</option>
                            <option value="Materials">Materials</option>
                            <option value="Products">Products</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Miscellaneous">Miscellaneous</option>
                        </select>
                    </div>
                </div>

                <div id="empty-state" class="hidden flex-col items-center justify-center py-16 px-4 bg-white rounded-2xl border border-slate-100 shadow-sm border-dashed">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 text-3xl mb-4">
                        <i class="fa-solid fa-ghost"></i>
                    </div>
                    <h3 class="text-lg font-medium text-slate-800">It's pretty empty here</h3>
                    <p class="text-slate-500 text-sm mt-1 text-center">Add items to your wishlist using the form to get started.</p>
                </div>

                <div id="item-list" class="space-y-4">
                    </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            // DOM Elements
            const form = document.getElementById('add-item-form');
            const listContainer = document.getElementById('item-list');
            const emptyState = document.getElementById('empty-state');
            const filterSelect = document.getElementById('filter-category');
            
            const statTotal = document.getElementById('stat-total');
            const statCost = document.getElementById('stat-cost');
            const statRemaining = document.getElementById('stat-remaining');

            // Utilities
            const generateId = () => '_' + Math.random().toString(36).substr(2, 9);
            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount || 0);
            };
            const escapeHTML = (str) => {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            };

            // Initial Render
            renderApp();

            // Event Listeners
            form.addEventListener('submit', handleAddItem);
            filterSelect.addEventListener('change', renderApp);

            // Logic: Add Item
            function handleAddItem(e) {
                e.preventDefault();
                
                const name = document.getElementById('input-name').value.trim();
                const category = document.getElementById('input-category').value;
                const price = parseFloat(document.getElementById('input-price').value) || 0;
                const priority = document.getElementById('input-priority').value;
                const url = document.getElementById('input-url').value.trim();

                if (!name || !category) return;

                const newItem = {
                    id: generateId(),
                    name,
                    category,
                    price,
                    priority,
                    url,
                    purchased: false,
                    createdAt: Date.now()
                };

                wishlist.push(newItem);
                saveData();
                form.reset();
                // Reset select explicitly due to some browser caching behaviors
                document.getElementById('input-priority').value = 'Medium';
                
                // If the filter is currently hiding the category we just added to, switch it to All
                if(filterSelect.value !== 'All' && filterSelect.value !== category) {
                    filterSelect.value = 'All';
                }

                renderApp();
            }

            // Logic: Delete Item
            window.deleteItem = function(id) {
                const itemEl = document.getElementById(`item-${id}`);
                // Add fade out animation
                itemEl.classList.remove('animate-fade-in');
                itemEl.classList.add('animate-fade-out');
                
                // Wait for animation to finish before removing from state and DOM
                setTimeout(() => {
                    wishlist = wishlist.filter(item => item.id !== id);
                    saveData();
                    renderApp();
                }, 300);
            };

            // Logic: Toggle Purchased
            window.togglePurchased = function(id) {
                const item = wishlist.find(item => item.id === id);
                if (item) {
                    item.purchased = !item.purchased;
                    saveData();
                    renderApp();
                }
            };

            // Logic: Save to LocalStorage
            function saveData() {
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
            }

            // Logic: Calculate Stats
            function updateDashboard() {
                const totalItems = wishlist.length;
                const remainingItems = wishlist.filter(item => !item.purchased).length;
                
                // Calculate cost only for unpurchased items to show "remaining cost"
                const remainingCost = wishlist.reduce((sum, item) => {
                    return !item.purchased ? sum + (item.price || 0) : sum;
                }, 0);

                statTotal.textContent = totalItems;
                statRemaining.textContent = remainingItems;
                statCost.textContent = formatCurrency(remainingCost);
            }

            // Logic: Get Badge Styling based on Priority
            function getPriorityBadge(priority, purchased) {
                const baseClasses = "text-xs font-semibold px-2.5 py-1 rounded-full whitespace-nowrap";
                const op = purchased ? "opacity-50 grayscale" : "";
                
                switch(priority) {
                    case 'High': return `<span class="${baseClasses} bg-red-100 text-red-700 ${op}">High Priority</span>`;
                    case 'Medium': return `<span class="${baseClasses} bg-amber-100 text-amber-700 ${op}">Medium Priority</span>`;
                    case 'Low': return `<span class="${baseClasses} bg-blue-100 text-blue-700 ${op}">Low Priority</span>`;
                    default: return '';
                }
            }

            // Logic: Get Category Icon
            function getCategoryIcon(category) {
                switch(category) {
                    case 'Materials': return '<i class="fa-solid fa-cube"></i>';
                    case 'Products': return '<i class="fa-solid fa-bag-shopping"></i>';
                    case 'Electronics': return '<i class="fa-solid fa-laptop"></i>';
                    case 'Miscellaneous': return '<i class="fa-solid fa-puzzle-piece"></i>';
                    default: return '<i class="fa-solid fa-tag"></i>';
                }
            }

            // Logic: Render Everything
            function renderApp() {
                updateDashboard();
                
                const filter = filterSelect.value;
                const filteredItems = filter === 'All' ? wishlist : wishlist.filter(i => i.category === filter);

                listContainer.innerHTML = '';

                if (filteredItems.length === 0) {
                    emptyState.classList.remove('hidden');
                    emptyState.classList.add('flex');
                } else {
                    emptyState.classList.add('hidden');
                    emptyState.classList.remove('flex');
                    
                    // Sort items: unpurchased first, then purchased. Secondary sort by date.
                    filteredItems.sort((a, b) => {
                        if (a.purchased === b.purchased) return b.createdAt - a.createdAt;
                        return a.purchased ? 1 : -1;
                    });

                    filteredItems.forEach(item => {
                        const nameEscaped = escapeHTML(item.name);
                        const isPurchased = item.purchased;
                        const cardStateClass = isPurchased ? 'bg-slate-50 opacity-70' : 'bg-white';
                        const textStateClass = isPurchased ? 'line-through text-slate-400' : 'text-slate-800';
                        const linkStateClass = isPurchased ? 'text-slate-400' : 'text-indigo-600 hover:text-indigo-800';
                        
                        const itemHTML = `
                            <div id="item-${item.id}" class="${cardStateClass} p-5 rounded-xl border border-slate-200 shadow-sm animate-fade-in strike-transition flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between group">
                                
                                <div class="flex items-start gap-4 flex-1 overflow-hidden">
                                    <div class="pt-1">
                                        <button onclick="togglePurchased('${item.id}')" 
                                            class="w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors ${isPurchased ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-300 text-transparent hover:border-indigo-400'}">
                                            <i class="fa-solid fa-check text-xs"></i>
                                        </button>
                                    </div>
                                    
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 mb-1 flex-wrap">
                                            <h3 class="font-bold text-lg ${textStateClass} truncate">${nameEscaped}</h3>
                                            ${item.url ? `<a href="${item.url}" target="_blank" class="${linkStateClass} text-sm transition-colors" title="View Link"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>` : ''}
                                        </div>
                                        <div class="flex items-center gap-3 flex-wrap">
                                            <span class="text-sm font-medium text-slate-500 flex items-center gap-1.5">
                                                ${getCategoryIcon(item.category)} ${item.category}
                                            </span>
                                            ${getPriorityBadge(item.priority, isPurchased)}
                                        </div>
                                    </div>
                                </div>

                                <div class="flex items-center gap-4 sm:ml-4 self-end sm:self-center w-full sm:w-auto justify-between sm:justify-end">
                                    <div class="text-lg font-bold ${isPurchased ? 'text-slate-400' : 'text-slate-700'}">
                                        ${item.price > 0 ? formatCurrency(item.price) : '<span class="text-sm font-normal text-slate-400">No price</span>'}
                                    </div>
                                    <button onclick="deleteItem('${item.id}')" title="Delete item"
                                        class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50 transition-colors focus:ring-2 focus:ring-red-100 outline-none">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </button>
                                </div>
                                
                            </div>
                        `;
                        listContainer.insertAdjacentHTML('beforeend', itemHTML);
                    });
                }
            }
        });
    </script>
</body>
</html>
